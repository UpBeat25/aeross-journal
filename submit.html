<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Paper</title>
    <link rel="stylesheet" href="main.css">

<style>
    body {
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    background-color: white;
    color: var(--red);
}

h1 {
    text-decoration: underline;
}

.form-container {

    max-width: 850px;

    margin: auto;

    padding: 40px;
    
}

.form-container h1 {

    margin-top: 0;

    font-size: 2.5rem;

    margin-bottom: 30px;
}

form {

    display: flex;

    flex-direction: column;

    gap: 20px;
}

input,
textarea,
button {

    font-family: inherit;
}

input,
textarea {

    width: 100%;

    padding: 14px;

    border:

        2px solid rgb(220,220,220);

    font-size: 16px;

    box-sizing: border-box;

    transition: 0.2s;
}

input:focus,
textarea:focus {

    outline: none;

    border-color: var(--red);

    box-shadow:
        0 0 0 4px rgba(255,0,0,0.08);
}

textarea {

    min-height: 180px;

    resize: vertical;

    line-height: 1.5;
}

.choose-genre {

    position: relative;
}

.suggestions {

    position: absolute;

    top: 100%;

    left: 0;

    width: 100%;

    background: white;

    border:
        2px solid rgb(230,230,230);

    border-top: none;

    overflow: hidden;

    z-index: 1000;

    box-shadow:
        0 8px 20px rgba(0,0,0,0.08);
}

.suggestion-item {

    padding: 14px;

    cursor: pointer;

    transition: 0.15s;
}

.suggestion-item:hover {

    background:
        rgb(245,245,245);
}

h3 {

    margin-bottom: -5px;


    font-size: 1.3rem;
}

.author-field {

    display: flex;

    gap: 12px;

    align-items: center;

    margin-bottom: 12px;
}

.author-field input {

    flex: 1;
}

.remove-author {

    background:
        rgb(255, 255, 255);

    color: var(--red);

    border: none;

    padding: 12px 18px;

    cursor: pointer;

    transition: 0.2s;
}

.remove-author:hover {

    opacity: 0.9;

    transform: translateY(-1px);
}

#addAuthor {

    background:
        rgb(240,240,240);

    border: none;

    padding: 14px;

    width: 50%;

    cursor: pointer;

    font-size: 15px;

    transition: 0.2s;
}

#addAuthor:hover {

    background:
        rgb(225,225,225);
}

button[type="submit"] {

    background: black;

    color: white;

    border: none;

    padding: 16px;

    font-size: 17px;

    cursor: pointer;

    transition: 0.2s;

    margin-top: 10px;
}

button[type="submit"]:hover {

    transform: translateY(-2px);

    opacity: 0.95;
}

input[type="file"] {

    padding: 12px;

    background:
        rgb(250,250,250);
}

@media (max-width: 700px) {

    .form-container {

        padding: 25px;
    }

    .author-field {

        flex-direction: column;
    }

    .remove-author {

        width: 100%;
    }
}
</style>
</head>
<body>

<div class="form-container">

    <h1>Submit Paper</h1>

    <form id="paperForm">

        <h3>Title</h3>
        <input type="text" name="title" placeholder="Paper Title" required>

        <h3>Category</h3>
        <div class="choose-genre">
            <input type="text" id="searchBox" placeholder="Search subjects..." autocomplete="off">
            <div class="suggestions" id="suggestions"></div>
        </div>
        <h3>Abstract</h3>
        <textarea name="abstract" placeholder="Abstract"></textarea>

        <h3>Authors</h3>

        <div id="authorsContainer">

            <div class="author-field">
                <input
                    type="text"
                    name="authors[]"
                    placeholder="Author User ID"
                    required
                >
            </div>

        </div>

        <button type="button" id="addAuthor">
            + Add Author
        </button>

        <h3>File Upload</h3>
        <input
            type="file"
            name="pdf"
            accept="application/pdf"
            required
        >

        <button type="submit">Submit Paper</button>

    </form>

</div>
<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
<script src="main.js"></script>
<script type="module">
if (!pb.authStore.isValid) {
    window.location.href = "/login.html";
}

try {
    await pb.collection("users").authRefresh();
} catch (err) {
    pb.authStore.clear();
    window.location.href = "/login.html";
}

const searchBox =
    document.getElementById("searchBox");

const suggestions =
    document.getElementById("suggestions");

const hiddenField =
    document.createElement("input");

hiddenField.type = "hidden";

hiddenField.name = "field";

document
    .getElementById("paperForm")
    .appendChild(hiddenField);

/* SEARCH */

searchBox.addEventListener("input", () => {

    const value =
        searchBox.value
        .toLowerCase()
        .trim();

    suggestions.innerHTML = "";

    if (!value) return;

    const matches =
        options.filter(item =>

            item.toLowerCase()
                .includes(value)
        );

    matches.forEach(match => {

        const div =
            document.createElement("div");

        div.classList.add("suggestion-item");

        div.textContent = match;

        /* CLICK AUTOFILL */

        div.onclick = () => {

            // Fill visible box
            searchBox.value = match;

            // Fill actual form field
            hiddenField.value = match;

            // Clear suggestions
            suggestions.innerHTML = "";
        };

        suggestions.appendChild(div);
    });
});

/* CLICK OUTSIDE CLOSES */

document.addEventListener("click", (e) => {

    if (
        !searchBox.contains(e.target)
        &&
        !suggestions.contains(e.target)
    ) {

        suggestions.innerHTML = "";
    }
});

/* ENTER WITHOUT CLICK */

searchBox.addEventListener("change", () => {

    hiddenField.value =
        searchBox.value;
});

const authorsContainer =
    document.getElementById("authorsContainer");

const addAuthor =
    document.getElementById("addAuthor");

/* ---------------- ADD AUTHORS ---------------- */

addAuthor.onclick = () => {

    const div = document.createElement("div");

    div.classList.add("author-field");

    div.innerHTML = `

        <input
            type="text"
            name="authors[]"
            placeholder="Author User ID"
            required
        >

        <button
            type="button"
            class="remove-author"
        >
            Remove
        </button>
    `;

    authorsContainer.appendChild(div);

    div.querySelector(".remove-author")
       .onclick = () => div.remove();
};

/* ---------------- SUBMIT ---------------- */

const form = document.getElementById("paperForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();
    await pb.collection("users").authRefresh();

    const user = pb.authStore.model;

    if (!user) {

        alert("You must be logged in");

        window.location.href = "/login.html";
        return;
    }

    if (!user.verified) {

        alert("Only verified users can submit papers");

        return;
    }
    try {

        const formData = new FormData();

        /* BASIC FIELDS */

        formData.append(
            "title",
            form.title.value
        );

        formData.append(
            "field",
            form.field.value
        );

        formData.append(
            "abstract",
            form.abstract.value
        );

        formData.append(
            "accepted",
            "false"
        );

        /* FILE */

        formData.append(
            "file",
            form.pdf.files[0]
        );

        /* AUTHORS */

        const authorInputs =
            document.querySelectorAll(
                'input[name="authors[]"]'
            );

        authorInputs.forEach(input => {

            formData.append(
                "authors",
                input.value
            );
        });

        /* CREATE PAPER */

        await pb.collection("papers")
            .create(formData);

        alert("Paper submitted successfully");

        form.reset();

        authorsContainer.innerHTML = `
            <div class="author-field">

                <input
                    type="text"
                    name="authors[]"
                    placeholder="Author User ID"
                    required
                >

            </div>
        `;

        window.location.href = "/index.html";
    }

    catch(err) {

        alert(JSON.stringify(err.response, null, 2));

    }
});

</script>

</body>
</html>
