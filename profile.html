<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="main.css">

<style>
    body {
        padding: 30px;
    }
    #profile {
        background-color: white;
        padding: 40px;
    }
    
    .paper-card {
        background-color: white;
        padding: 40px;
    }

    .paper-title {
        font-size: 3rem;
    }

    .abstract {
        text-align: justify;
    }
    #logout {
        width: 100px;
        height: 40px;
        color: white;
        cursor: pointer;
        background-color: var(--red);
    }

    #support {
        width: 100px;
        height: 40px;
        color: white;
        cursor: pointer;
        background-color: black;
    }
</style>
</head>

<body>
<div id="profile">
</div>
<br>
<div id="papers"></div>

<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

<script src="main.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const user_c = pb.authStore.model;
async function loadProfile() {

    try {

        // Get user
        const user =
            await pb.collection("users")
            .getOne(id);

        // Render profile
        document.getElementById("profile")
            .innerHTML = `
                <a href="/index.html">Back to Home Page</a>
                <h1 id="name">${user.name}</h1>
                ${
                    user.aeross
                    ? `
                        <a href="/approval.html"><b>Aeross Member</b></a>
                    `
                    : ""
                }
                <p id="institute"><b>Institute:</b> ${user.institution || ""}</p>
                ${
                    pb.authStore.isValid
                    ? `
                        <p id="email">
                            <b>Email:</b>
                            ${user.email || ""}
                        </p>
                    `
                    : ""
                }
                
                ${
                    user_c && user_c.id !== user.id
                    ? `
                        <p id="field"><b>Primary Field:</b> ${user.primary_field || ""}</p>
                    `
                    : `
                        <b>Primary Field:</b> 
                        <input type="text" id="searchBox" name="searchBox" placeholder="Search subjects..." autocomplete="off" value="${user.primary_field}">
                        <div class="suggestions" id="suggestions"></div>
                    `
                }
                <p id="orcid"><b>ORCID:</b> <a href="https://orcid.org/${user.orcid}">${user.orcid || ""}</a></p>
                <button onclick="navigator.clipboard.writeText('${user.id}')"><p><b>Aeross Journal ID:</b> ${user.id || ""}</p></button>
                <p id="dob"><b>Date of Birth:</b> ${user.birthdate
                    ? user.birthdate.split(" ")[0]
                    : ""}</p>

                ${
                    user_c && user_c.id === user.id
                    ? `
                        <button onclick="logout()" id="logout">Logout</button>
                    `
                    : ""
                }
                <button id="support" onclick="window.location.href = 'mailto:journal@aeross.org'">Support</button>
            `;
        const searchBox = document.getElementById("searchBox");
        const suggestions = document.getElementById("suggestions");

        setupSearch(searchBox, suggestions);
        // Get papers where this user is an author
        const papers =
            await pb.collection("papers")
            .getFullList({

                filter: `authors ~ "${id}"`,

                expand: "authors",

                sort: "-created"
            });

        const papersContainer =
            document.getElementById("papers");

        papersContainer.innerHTML = "";

        papers.forEach(paper => {

            // Build author links
            let authorsHTML = "";

            if (paper.expand?.authors) {

                paper.expand.authors.forEach(author => {

                    authorsHTML += `
                        <a href="profile.html?id=${author.id}">
                            ${author.name}
                        </a>
                    `;
                });
            }

            // PocketBase file URL
            const pdfUrl =
                pb.files.getURL(
                    paper,
                    paper.file
                );

            papersContainer.innerHTML += `
                <a class="paper-link" href="paper.html?id=${paper.id}">
                    <div class="paper-card">

                        <h2>${paper.title}</h2>

                        <div class="authors">
                            ${authorsHTML}
                        </div>

                        <p class="abstract"><b>Abstract:</b> ${paper.abstract.length > 650
                        ? paper.abstract.slice(0, 650) + "<b>... Read More</b>"
                        : paper.abstract}</p>

                        <p><b>Field:</b> ${paper.field || ""}</p>

                    </div>
                </a>
            `;
        });
    }

    catch(err) {

        document.body.innerHTML += `
            <p>Error loading profile.</p>
        `;
    }
}

loadProfile();

        async function setupSearch(searchBox, suggestions) {

            searchBox.addEventListener("input", () => {
                suggestions.style.display = "block";
                const value = searchBox.value.toLowerCase();

                suggestions.innerHTML = "";

                if (value === "") return;

                const matches = options.filter(item =>
                    item.toLowerCase().includes(value)
                );

                matches.forEach(match => {

                    const div = document.createElement("div");

                    div.classList.add("suggestion-item");
                    div.textContent = match;

                    div.addEventListener("click", () => {
                        searchBox.value = match;
                        suggestions.style.display = "none";
                        pb.collection('users').update(user_c.id, {
				            primary_field: match
                        })
                    });

                    suggestions.appendChild(div);
                });
            });
        }
async function logout() {
    pb.authStore.clear();
    window.location.href = "/login.html";
    return;
}

</script>

</body>
</html>
