<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search Redirect</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 40px;
    }

    .search-container {
        width: 300px;
        position: relative;
    }

    input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
    }

    .suggestions {
        position: absolute;
        width: 100%;
        background: white;
        border: 1px solid #ccc;
        border-top: none;
        max-height: 200px;
        overflow-y: auto;
    }

    .suggestion-item {
        padding: 10px;
        cursor: pointer;
    }

    .suggestion-item:hover {
        background: #f0f0f0;
    }
</style>
</head>
<body>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="Search subjects...">
    <div class="suggestions" id="suggestions"></div>
</div>



</body>
</html>
